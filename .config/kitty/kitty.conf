# font_family      FiraCode-Light
# font_family        
# font_family      JetBrainsMonoNLNFM-Light
# font_family      JetBrainsMonoNLNFM
# font_family      VictorMono
# font_family      CommitMono

# Best for myopia + ligatures (large x-height, clear chars)
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
# font_size 12.3
font_size 12

# Enable ligatures
font_features JetBrainsMono\ Nerd\ Font\ Mono +calt +liga

# Cursor style
cursor_shape block

# More scrollback history
scrollback_lines 10000

# Tab bar - clean
tab_bar_style slant
tab_bar_edge bottom

# Selection colors
selection_background #4a4a4a
selection_foreground #ffffff

# Smooth scrolling
wheel_scroll_multiplier 3.0

# Don't ask on close
confirm_os_window_close 0

background_opacity 0.80
background_blur 34

hide_window_decorations titlebar-only

map cmd+shift+d send_text all \x01-
map cmd+d send_text all \x01|
map cmd+t op_op
map cmd+t send_text all \x01c

map cmd+Right send_text all \x01]
map cmd+Left send_text all \x01[
map cmd+w send_text all \x01x
